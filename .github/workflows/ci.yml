name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      # Build needs Firebase + OpenAI env at module-load time. We bypass that
      # in CI by injecting placeholder env so the bundler succeeds; the build
      # output is not deployed from here.
      - name: Build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ci-placeholder
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: example.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci-project
          NEXT_PUBLIC_FIREBASE_APP_ID: 1:0:web:0
          FIREBASE_ADMIN_PROJECT_ID: ci-project
          FIREBASE_ADMIN_CLIENT_EMAIL: ci@example.iam.gserviceaccount.com
          FIREBASE_ADMIN_PRIVATE_KEY: "-----BEGIN PRIVATE KEY-----\nMIIBVQIBADANBgkqhkiG9w0BAQEFAASCAT8wggE7AgEAAkEAxlkQz0+0\n-----END PRIVATE KEY-----\n"
          OPENAI_API_KEY: sk-ci-placeholder
        run: npm run build
